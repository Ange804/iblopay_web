<!-- src/app/modules/auth/forgot-password/forgot-password.component.html -->
<div class="auth-page">
  <div class="auth-bg">
    <div class="bg-gradient"></div>
    <div class="bg-pattern"></div>
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <div class="auth-card">
    <div class="card-content">
      <!-- Back link -->
      <a routerLink="/auth/login" class="back-link" id="back-to-login">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Retour à la connexion</span>
      </a>

      <!-- Icon -->
      <div class="card-icon">
        <div class="icon-bg">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
      </div>

      <div class="card-header">
        <h2>Mot de passe oublié</h2>
        <p>Entrez votre numéro de téléphone pour recevoir un code de vérification par SMS</p>
      </div>

      <!-- Success message -->
      <div class="alert alert-success" *ngIf="successMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <!-- Error message -->
      <div class="alert alert-error" *ngIf="errorMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form" id="forgot-password-form">
        <div class="form-group" [class.has-error]="getFieldError('phone_number')">
          <label for="forgot_phone">Numéro de téléphone</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
            <input
              type="tel"
              id="forgot_phone"
              formControlName="phone_number"
              placeholder="+237 6XX XXX XXX"
              autocomplete="tel"
            />
          </div>
          <div class="field-error" *ngIf="getFieldError('phone_number')">
            {{ getFieldError('phone_number') }}
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary"
          id="send-otp-btn"
          [disabled]="isLoading || otpSent"
          [class.loading]="isLoading"
        >
          <span *ngIf="!isLoading && !otpSent">Envoyer le code</span>
          <span *ngIf="otpSent && !isLoading">✓ Code envoyé</span>
          <div class="btn-loader" *ngIf="isLoading">
            <div class="spinner"></div>
            <span>Envoi en cours...</span>
          </div>
        </button>
      </form>
    </div>
  </div>
</div>
