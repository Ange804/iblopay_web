<!-- src/app/modules/auth/two-factor-auth/two-factor-auth.component.html -->
<div class="auth-page">
  <div class="auth-bg">
    <div class="bg-gradient"></div>
    <div class="bg-pattern"></div>
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <div class="auth-card">
    <div class="card-content">
      <!-- Back link -->
      <a routerLink="/auth/login" class="back-link" id="back-to-login">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Retour à la connexion</span>
      </a>

      <!-- Icon -->
      <div class="card-icon">
        <div class="icon-bg">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="11" width="14" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <div class="card-header">
        <h2>Double Facteur (2FA)</h2>
        <p>Pour des raisons de sécurité, nous avons envoyé un code de vérification à 6 chiffres par SMS au numéro <strong>{{ maskedPhone }}</strong>.</p>
      </div>

      <!-- Success message -->
      <div class="alert alert-success" *ngIf="successMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <!-- Error message -->
      <div class="alert alert-error" *ngIf="errorMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="auth-form" id="two-factor-form">
        <div class="form-group" [class.has-error]="getFieldError('otp_code')">
          <label for="otp_code">Code de vérification (6 chiffres)</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <input
              type="text"
              id="otp_code"
              formControlName="otp_code"
              placeholder="123456"
              maxlength="6"
              autocomplete="one-time-code"
            />
          </div>
          <div class="field-error" *ngIf="getFieldError('otp_code')">
            {{ getFieldError('otp_code') }}
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary"
          id="verify-otp-btn"
          [disabled]="isLoading || otpForm.invalid"
          [class.loading]="isLoading"
        >
          <span *ngIf="!isLoading">Vérifier et continuer</span>
          <div class="btn-loader" *ngIf="isLoading">
            <div class="spinner"></div>
            <span>Vérification...</span>
          </div>
        </button>

        <div class="resend-container">
          <p *ngIf="!canResend">Renvoyer le code dans <strong>{{ cooldown }}s</strong></p>
          <button
            type="button"
            class="btn-resend"
            *ngIf="canResend"
            (click)="resendOtp()"
            [disabled]="isLoading"
          >
            Renvoyer le code SMS
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
