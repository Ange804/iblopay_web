<!-- src/app/modules/auth/reset-password/reset-password.component.html -->
<div class="auth-page">
  <div class="auth-bg">
    <div class="bg-gradient"></div>
    <div class="bg-pattern"></div>
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <div class="auth-card">
    <div class="card-content">
      <!-- Back link -->
      <a routerLink="/auth/login" class="back-link" id="back-to-login">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Retour à la connexion</span>
      </a>

      <!-- Icon -->
      <div class="card-icon">
        <div class="icon-bg">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
        </div>
      </div>

      <div class="card-header">
        <h2>Nouveau PIN</h2>
        <p>Entrez le code OTP reçu par SMS et définissez votre nouveau PIN de connexion.</p>
      </div>

      <!-- Success message -->
      <div class="alert alert-success" *ngIf="successMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>{{ successMessage }}</span>
      </div>

      <!-- Error message -->
      <div class="alert alert-error" *ngIf="errorMessage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form" id="reset-password-form">
        <!-- Phone Display (Read-Only) -->
        <div class="form-group">
          <label>Numéro de téléphone</label>
          <div class="input-wrapper disabled">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
            <input
              type="text"
              [value]="phoneNumber"
              disabled
            />
          </div>
        </div>

        <!-- OTP Code -->
        <div class="form-group" [class.has-error]="getFieldError('otp_code')">
          <label for="otp_code">Code OTP (6 chiffres)</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <input
              type="text"
              id="otp_code"
              formControlName="otp_code"
              placeholder="123456"
              maxlength="6"
              autocomplete="one-time-code"
            />
          </div>
          <div class="field-error" *ngIf="getFieldError('otp_code')">
            {{ getFieldError('otp_code') }}
          </div>
        </div>

        <!-- New PIN -->
        <div class="form-group" [class.has-error]="getFieldError('new_pin')">
          <label for="new_pin">Nouveau PIN (4-6 chiffres)</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <input
              [type]="showNewPin ? 'text' : 'password'"
              id="new_pin"
              formControlName="new_pin"
              placeholder="••••"
              maxlength="6"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pin" (click)="toggleNewPinVisibility()" tabindex="-1">
              <svg *ngIf="!showNewPin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showNewPin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <div class="field-error" *ngIf="getFieldError('new_pin')">
            {{ getFieldError('new_pin') }}
          </div>
        </div>

        <!-- Confirm PIN -->
        <div class="form-group" [class.has-error]="getFieldError('confirm_pin')">
          <label for="confirm_pin">Confirmer le PIN</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <input
              [type]="showConfirmPin ? 'text' : 'password'"
              id="confirm_pin"
              formControlName="confirm_pin"
              placeholder="••••"
              maxlength="6"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pin" (click)="toggleConfirmPinVisibility()" tabindex="-1">
              <svg *ngIf="!showConfirmPin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showConfirmPin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <div class="field-error" *ngIf="getFieldError('confirm_pin')">
            {{ getFieldError('confirm_pin') }}
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary"
          id="reset-pin-btn"
          [disabled]="isLoading || resetForm.invalid"
          [class.loading]="isLoading"
        >
          <span *ngIf="!isLoading">Réinitialiser le PIN</span>
          <div class="btn-loader" *ngIf="isLoading">
            <div class="spinner"></div>
            <span>Traitement...</span>
          </div>
        </button>
      </form>
    </div>
  </div>
</div>
