<div class="services-publics-edit">
    <button class="back-btn" (click)="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Retour à la liste
    </button>

    <!-- Loading -->
    <div *ngIf="loading" class="loading">
        <div class="loader-spinner"></div>
        <span>Chargement...</span>
    </div>

    <!-- Formulaire de modification -->
    <div *ngIf="!loading && service" class="edit-card">
        <!-- En-tête comme la vue détail -->
        <div class="detail-header">
            <div class="detail-title">
                <span class="detail-icon" [style.background]="getServiceColor(service.abreviation)">
                    {{ service.abreviation.charAt(0) }}
                </span>
                <div>
                    <h2>Modifier : {{ service.abreviation }}</h2>
                    <span class="detail-id">ID: {{ service.id }}</span>
                </div>
            </div>
            <div class="detail-badges">
                <span class="badge" [ngClass]="service.type === 'INTERNE' ? 'badge-interne' : 'badge-externe'">
                    {{ service.type }}
                </span>
                <span class="badge" [ngClass]="service.actif ? 'badge-actif' : 'badge-inactif'">
                    <span class="status-dot"></span>
                    {{ service.actif ? 'Actif' : 'Inactif' }}
                </span>
            </div>
        </div>

        <form (ngSubmit)="onSubmit()" #editForm="ngForm">
            <!-- Message d'erreur -->
            <div *ngIf="error" class="error-message">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
                {{ error }}
            </div>

            <!-- Champs du formulaire en grille -->
            <div class="form-grid">
                <div class="form-group">
                    <label for="abreviation">Abréviation *</label>
                    <input type="text" id="abreviation" [(ngModel)]="service.abreviation" name="abreviation" required
                        placeholder="Ex: GPR-RNF">
                </div>

                <div class="form-group">
                    <label for="numero">Numéro *</label>
                    <input type="number" id="numero" [(ngModel)]="service.numero" name="numero" required
                        placeholder="Ex: 1">
                </div>

                <div class="form-group full-width">
                    <label for="description">Description *</label>
                    <textarea id="description" [(ngModel)]="service.description" name="description" rows="3" required
                        placeholder="Description détaillée du service..."></textarea>
                </div>

                <div class="form-group">
                    <label for="type">Type *</label>
                    <select id="type" [(ngModel)]="service.type" name="type" required>
                        <option value="INTERNE">Interne</option>
                        <option value="EXTERNE">Externe</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="version">Version</label>
                    <input type="text" id="version" [(ngModel)]="service.version" name="version"
                        placeholder="Ex: 2.3.1">
                </div>

                <div class="form-group">
                    <label for="responsable">Responsable</label>
                    <input type="text" id="responsable" [(ngModel)]="service.responsable" name="responsable"
                        placeholder="Nom du responsable">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" [(ngModel)]="service.email" name="email"
                        placeholder="email@domaine.bi">
                </div>

                <div class="form-group">
                    <label for="telephone">Téléphone</label>
                    <input type="text" id="telephone" [(ngModel)]="service.telephone" name="telephone"
                        placeholder="+257 XX XX XX XX">
                </div>

                <div class="form-group full-width">
                    <label for="siteWeb">Site Web</label>
                    <input type="url" id="siteWeb" [(ngModel)]="service.siteWeb" name="siteWeb"
                        placeholder="https://domaine.bi/service">
                </div>

                <div class="form-group">
                    <label for="dateCreation">Date de création</label>
                    <input type="date" id="dateCreation" [(ngModel)]="service.dateCreation" name="dateCreation"
                        [value]="service.dateCreation | date:'yyyy-MM-dd'">
                </div>

                <div class="form-group">
                    <label for="actif">Statut</label>
                    <select id="actif" [(ngModel)]="service.actif" name="actif">
                        <option [ngValue]="true">Actif</option>
                        <option [ngValue]="false">Inactif</option>
                    </select>
                </div>
            </div>

            <!-- Boutons d'action -->
            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="cancel()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                    Annuler
                </button>
                <button type="submit" class="btn-save" [disabled]="editForm.invalid">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </svg>
                    Enregistrer
                </button>
            </div>
        </form>
    </div>

    <!-- Service non trouvé -->
    <div *ngIf="!loading && !service" class="not-found">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="15" y1="9" x2="9" y2="15" />
            <line x1="9" y1="9" x2="15" y2="15" />
        </svg>
        <span>Service non trouvé</span>
    </div>
</div>
