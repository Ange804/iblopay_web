<!-- src/app/modules/dashboard/widgets/agents-status/agents-status.component.html -->
<div class="agents-status">
    <h3>Statut des agents</h3>

    <div class="status-chart">
        <div class="status-ring">
            <svg viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="50" fill="none" stroke="#f3f4f6" stroke-width="12" />
                <circle cx="60" cy="60" r="50" fill="none" stroke="#22c55e" stroke-width="12"
                    [attr.stroke-dasharray]="onlinePercentage + ' 100'" stroke-dashoffset="0" stroke-linecap="round"
                    transform="rotate(-90 60 60)" />
            </svg>
            <div class="ring-label">
                <span class="number">{{ online }}</span>
                <span class="label">En ligne</span>
            </div>
        </div>

        <div class="status-details">
            <div class="status-item online">
                <span class="dot"></span>
                <span class="label">En ligne</span>
                <span class="value">{{ online }}</span>
                <span class="percentage">{{ onlinePercentage.toFixed(0) }}%</span>
            </div>
            <div class="status-item busy">
                <span class="dot"></span>
                <span class="label">Occupés</span>
                <span class="value">{{ busy }}</span>
                <span class="percentage">{{ busyPercentage.toFixed(0) }}%</span>
            </div>
            <div class="status-item offline">
                <span class="dot"></span>
                <span class="label">Hors ligne</span>
                <span class="value">{{ offline }}</span>
                <span class="percentage">{{ offlinePercentage.toFixed(0) }}%</span>
            </div>
        </div>
    </div>
</div>
