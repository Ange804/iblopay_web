<div style="margin-bottom: 24px;">
  <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px;">
    <div>
      <h1 style="font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700; margin: 0; color: var(--text, #ffffff);">Rapports & Analytics</h1>
      <p style="color: var(--text-dim, #a3b1cc); font-size: 13px; margin: 4px 0 0 0;">Sélectionnez un rapport pour voir les détails</p>
    </div>
    <div class="role-toggle">
      <button [class.active]="currentRole === 'admin'" (click)="setRole('admin')">Admin</button>
      <button [class.active]="currentRole === 'super_agent'" (click)="setRole('super_agent')">Super Agent</button>
      <button [class.active]="currentRole === 'agent'" (click)="setRole('agent')">Agent</button>
    </div>
  </div>

  <ng-container *ngFor="let catKey of getCategoryKeys()">
    <h3 style="font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text-faint, #64748b); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 12px 0; font-weight: 600;">
      {{ categoryLabels[catKey] || catKey }}
    </h3>
    <div class="reports-grid">
      <div class="report-card" *ngFor="let r of getReportsByCategory(catKey)" (click)="openReport(r.route)">
        <div style="display: flex; align-items: flex-start; gap: 14px;">
          <div class="report-card-icon" [style.background]="categoryColors[r.category] + '18'" [style.color]="categoryColors[r.category]">
            <i [class]="r.icon"></i>
          </div>
          <div style="flex: 1; min-width: 0;">
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
              <h4 style="font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; margin: 0; color: var(--text, #ffffff);">{{ r.name }}</h4>
              <span class="category-badge" [style.background]="(categoryColors[r.category] || '#3b82f6') + '22'" [style.color]="categoryColors[r.category] || '#3b82f6'">
                {{ (categoryLabels[r.category] || r.category).split(' &')[0] }}
              </span>
            </div>
            <p style="font-size: 12px; color: var(--text-dim, #a3b1cc); margin: 6px 0 0 0; line-height: 1.4;">{{ r.description }}</p>
          </div>
          <i class="fa-solid fa-chevron-right" style="color: var(--text-faint, #64748b); font-size: 12px; margin-top: 12px;"></i>
        </div>
      </div>
    </div>
  </ng-container>

  <div *ngIf="filteredReports.length === 0" style="text-align: center; padding: 60px 20px; color: var(--text-dim, #a3b1cc);">
    <i class="fa-solid fa-eye-slash" style="font-size: 32px; display: block; margin-bottom: 12px; opacity: 0.4;"></i>
    <p style="font-size: 14px;">Aucun rapport disponible pour ce rôle.</p>
  </div>
</div>
